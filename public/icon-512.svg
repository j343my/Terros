<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A3B18A"/>
      <stop offset="100%" stop-color="#8FA878"/>
    </linearGradient>
    <linearGradient id="seedBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#EDE0CC"/>
    </linearGradient>
    <linearGradient id="sprout" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6B8F5E"/>
      <stop offset="100%" stop-color="#A3B18A"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E8B4A0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8B4A0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Small ears -->
  <ellipse cx="188" cy="180" rx="16" ry="20" fill="#F5ECDC" stroke="#DDD2BE" stroke-width="1.5"/>
  <ellipse cx="188" cy="180" rx="9" ry="12" fill="#FFF3E3" opacity="0.5"/>
  <ellipse cx="324" cy="180" rx="16" ry="20" fill="#F5ECDC" stroke="#DDD2BE" stroke-width="1.5"/>
  <ellipse cx="324" cy="180" rx="9" ry="12" fill="#FFF3E3" opacity="0.5"/>

  <!-- Seed body -->
  <path d="M256 120 Q322 158 328 248 Q332 322 300 362 Q278 388 256 395 Q234 388 212 362 Q180 322 184 248 Q190 158 256 120 Z" fill="url(#seedBody)" stroke="#D4C4A8" stroke-width="2"/>

  <!-- Highlight -->
  <ellipse cx="230" cy="195" rx="22" ry="32" fill="white" opacity="0.3" transform="rotate(-12 230 195)"/>

  <!-- Sprout -->
  <path d="M256 125 Q252 88 244 62 Q260 78 256 112 Z" fill="url(#sprout)"/>
  <path d="M256 125 Q261 86 270 60 Q254 78 256 112 Z" fill="url(#sprout)"/>
  <path d="M244 68 Q232 58 226 50 Q238 56 244 68 Z" fill="#A3B18A"/>
  <path d="M270 65 Q280 54 287 48 Q276 56 270 65 Z" fill="#A3B18A"/>

  <!-- Eyes -->
  <ellipse cx="232" cy="255" rx="10" ry="11" fill="#5D4037"/>
  <ellipse cx="280" cy="255" rx="10" ry="11" fill="#5D4037"/>
  <ellipse cx="235" cy="251" rx="3.5" ry="4" fill="white" opacity="0.85"/>
  <ellipse cx="283" cy="251" rx="3.5" ry="4" fill="white" opacity="0.85"/>

  <!-- Smile -->
  <path d="M244 290 Q256 305 268 290" fill="none" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="215" cy="282" rx="14" ry="10" fill="url(#cheek)"/>
  <ellipse cx="297" cy="282" rx="14" ry="10" fill="url(#cheek)"/>

  <!-- Feet -->
  <ellipse cx="238" cy="398" rx="16" ry="8" fill="#EDE0CC" stroke="#D4C4A8" stroke-width="1.5"/>
  <ellipse cx="274" cy="398" rx="16" ry="8" fill="#EDE0CC" stroke="#D4C4A8" stroke-width="1.5"/>
</svg>
